<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header>
        <div class="logo">Weather Forecast</div>
        <form class="search-box">
            <input type="search" class="location-input">
            <button type="submit" class="submit-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>magnify</title><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
            </button>
        </form>
    </header>
    <main>
      <div class="weather-now">
        <div class="current-location"></div>
        <div class="current-conditions"></div>
      </div>
      <div class="weather-daily"></div>
      <div class="weather-hourly"></div>
    </main>
    <footer>
      Powered by <a href="https://www.visualcrossing.com/">Visual Crossing</a>.
      Developed by <a href="https://github.com/wolfieslab">Wolfie's Lab</a>
    </footer>
  </body>
</html>
