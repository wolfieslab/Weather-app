<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
  </head>
  <body>
    <header>
      <form class="search-box">
        <input type="search" class="location-input" />
        <button type="submit" class="submit-btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <title>magnify</title>
            <path
              d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"
            />
          </svg>
        </button>
      </form>
      <div class="toggle-unit">
        <span class="metric unit active">°C</span>
        <span class="us unit">°F</span>
      </div>
    </header>
    <main>
      <div class="weather-now">
        <div class="weather-current-card">
          <div class="current-location">
            <div class="location-datetime">Today</div>
            <div class="location-name">Gurugram, Haryana, India</div>
          </div>
          <div class="weather-current-conditions">
            <div class="weather-current-temperature">24°C</div>
            <div>
              <!-- <div class="weather-current-icon"></div> -->
              <div class="current-feelslike-group">
                <span class="feelslike-text">Feels like </span>
                <span class="feelslike-value">27°C</span>
              </div>
              <div class="current-condition">Partially Cloudy</div>
            </div>
          </div>
        </div>
        <div class="weather-current-details">
          <div class="current-humidity card">
            <div class="humidity-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>water-outline</title>
                  <path
                    d="M12,3.77L11.25,4.61C11.25,4.61 9.97,6.06 8.68,7.94C7.39,9.82 6,12.07 6,14.23A6,6 0 0,0 12,20.23A6,6 0 0,0 18,14.23C18,12.07 16.61,9.82 15.32,7.94C14.03,6.06 12.75,4.61 12.75,4.61L12,3.77M12,6.9C12.44,7.42 12.84,7.85 13.68,9.07C14.89,10.83 16,13.07 16,14.23C16,16.45 14.22,18.23 12,18.23C9.78,18.23 8,16.45 8,14.23C8,13.07 9.11,10.83 10.32,9.07C11.16,7.85 11.56,7.42 12,6.9Z"
                  />
                </svg>
              </span>
              <span class="text">Humidity</span>
            </div>
            <div class="humidity value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
          <div class="current-cloud-cover card">
            <div class="cloud-cover-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>cloud-outline</title>
                  <path
                    d="M6.5 20Q4.22 20 2.61 18.43 1 16.85 1 14.58 1 12.63 2.17 11.1 3.35 9.57 5.25 9.15 5.88 6.85 7.75 5.43 9.63 4 12 4 14.93 4 16.96 6.04 19 8.07 19 11 20.73 11.2 21.86 12.5 23 13.78 23 15.5 23 17.38 21.69 18.69 20.38 20 18.5 20M6.5 18H18.5Q19.55 18 20.27 17.27 21 16.55 21 15.5 21 14.45 20.27 13.73 19.55 13 18.5 13H17V11Q17 8.93 15.54 7.46 14.08 6 12 6 9.93 6 8.46 7.46 7 8.93 7 11H6.5Q5.05 11 4.03 12.03 3 13.05 3 14.5 3 15.95 4.03 17 5.05 18 6.5 18M12 12Z"
                  />
                </svg>
              </span>
              <span class="text">Cloud Cover</span>
            </div>
            <div class="cloud-cover value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
          <div class="current-visibility card">
            <div class="visibility-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>eye-outline</title>
                  <path
                    d="M12,9A3,3 0 0,1 15,12A3,3 0 0,1 12,15A3,3 0 0,1 9,12A3,3 0 0,1 12,9M12,4.5C17,4.5 21.27,7.61 23,12C21.27,16.39 17,19.5 12,19.5C7,19.5 2.73,16.39 1,12C2.73,7.61 7,4.5 12,4.5M3.18,12C4.83,15.36 8.24,17.5 12,17.5C15.76,17.5 19.17,15.36 20.82,12C19.17,8.64 15.76,6.5 12,6.5C8.24,6.5 4.83,8.64 3.18,12Z"
                  />
                </svg>
              </span>
              <span class="text">Visibility</span>
            </div>
            <div class="visibility value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
          <div class="current-uvindex card">
            <div class="uvindex-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>white-balance-sunny</title>
                  <path
                    d="M3.55 19.09L4.96 20.5L6.76 18.71L5.34 17.29M12 6C8.69 6 6 8.69 6 12S8.69 18 12 18 18 15.31 18 12C18 8.68 15.31 6 12 6M20 13H23V11H20M17.24 18.71L19.04 20.5L20.45 19.09L18.66 17.29M20.45 5L19.04 3.6L17.24 5.39L18.66 6.81M13 1H11V4H13M6.76 5.39L4.96 3.6L3.55 5L5.34 6.81L6.76 5.39M1 13H4V11H1M13 20H11V23H13"
                  />
                </svg>
              </span>
              <span class="text">UV Index</span>
            </div>
            <div class="uvindex value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
          <div class="current-precipitation card">
            <div class="precipitation-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>water-outline</title>
                  <path
                    d="M12,3.77L11.25,4.61C11.25,4.61 9.97,6.06 8.68,7.94C7.39,9.82 6,12.07 6,14.23A6,6 0 0,0 12,20.23A6,6 0 0,0 18,14.23C18,12.07 16.61,9.82 15.32,7.94C14.03,6.06 12.75,4.61 12.75,4.61L12,3.77M12,6.9C12.44,7.42 12.84,7.85 13.68,9.07C14.89,10.83 16,13.07 16,14.23C16,16.45 14.22,18.23 12,18.23C9.78,18.23 8,16.45 8,14.23C8,13.07 9.11,10.83 10.32,9.07C11.16,7.85 11.56,7.42 12,6.9Z"
                  />
                </svg>
              </span>
              <span class="text">Precipitation</span>
            </div>
            <div class="precipitation value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
          <div class="current-wind card">
            <div class="wind-icon text-group">
              <span class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <title>weather-windy</title>
                  <path
                    d="M4,10A1,1 0 0,1 3,9A1,1 0 0,1 4,8H12A2,2 0 0,0 14,6A2,2 0 0,0 12,4C11.45,4 10.95,4.22 10.59,4.59C10.2,5 9.56,5 9.17,4.59C8.78,4.2 8.78,3.56 9.17,3.17C9.9,2.45 10.9,2 12,2A4,4 0 0,1 16,6A4,4 0 0,1 12,10H4M19,12A1,1 0 0,0 20,11A1,1 0 0,0 19,10C18.72,10 18.47,10.11 18.29,10.29C17.9,10.68 17.27,10.68 16.88,10.29C16.5,9.9 16.5,9.27 16.88,8.88C17.42,8.34 18.17,8 19,8A3,3 0 0,1 22,11A3,3 0 0,1 19,14H5A1,1 0 0,1 4,13A1,1 0 0,1 5,12H19M18,18H4A1,1 0 0,1 3,17A1,1 0 0,1 4,16H18A3,3 0 0,1 21,19A3,3 0 0,1 18,22C17.17,22 16.42,21.66 15.88,21.12C15.5,20.73 15.5,20.1 15.88,19.71C16.27,19.32 16.9,19.32 17.29,19.71C17.47,19.89 17.72,20 18,20A1,1 0 0,0 19,19A1,1 0 0,0 18,18Z"
                  />
                </svg>
              </span>
              <span class="text">Wind</span>
            </div>
            <div class="wind value-group">
              <span class="value">50</span>
              <span class="unit">%</span>
            </div>
          </div>
        </div>
      </div>
      <div class="weather-daily"></div>
      <div class="weather-hourly"></div>
    </main>
    <footer>
      Powered by <a href="https://www.visualcrossing.com/">Visual Crossing</a>.
      Developed by <a href="https://github.com/wolfieslab">Wolfie's Lab</a>
    </footer>
  </body>
</html>
